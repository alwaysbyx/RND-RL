# Gymnasium PPO-CMA configuration
# Based on Hämäläinen et al., "PPO-CMA", IEEE MLSP 2020
env_type: "gym"
env_id: "HalfCheetah-v4"
algorithm: "ppocma"

# Experiment settings
exp_name: null
seed: 1
torch_deterministic: true
cuda: true
track: false
wandb_project_name: "cleanRL"
wandb_entity: "alwaysbb"
wandb_group: "PPO-CMA"
capture_video: false
save_model: false
evaluate: false
checkpoint: null

# Environment settings
num_envs: 16
num_eval_envs: 8
num_steps: 1024
num_eval_steps: 1000

# PPO-CMA hyperparameters (paper Table 2 + Section 6)
total_timesteps: 5_000_000
mean_lr: 3e-4
var_lr: 3e-4
critic_lr: 3e-4
learning_rate: 3e-4
anneal_lr: false
gamma: 0.99
gae_lambda: 0.95
num_minibatches: 64
norm_adv: false
max_grad_norm: 0.5
reward_scale: 1.0
finite_horizon_gae: false
eval_freq: 1

# PPO-CMA specific
history_buffer_size: 5       # H (paper recommends H >= 5)
variance_train_steps: 100    # K minibatch steps for variance
mean_train_steps: 100        # K minibatch steps for mean
critic_train_steps: 100      # K minibatch steps for critic
lower_std_limit: 0.01        # minimum standard deviation
critic_loss_type: "l1"       # paper Table 2
use_mirroring: true          # Section 5.2

# Network architecture (paper Table 2)
discrete_action: false
ppocma_actor_width: 128
ppocma_actor_depth: 2
actor_width: 128
actor_depth: 2
critic_width: 128
critic_depth: 2
use_residual_blocks: false
num_bins: 41
