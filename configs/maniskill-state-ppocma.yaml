# ManiSkill state-based PPO-CMA configuration
# Based on Hämäläinen et al., "PPO-CMA", IEEE MLSP 2020
env_type: "maniskill-state"
env_id: "PickCube-v1"
algorithm: "ppocma"

# Experiment settings
exp_name: null
seed: 1
torch_deterministic: true
cuda: true
track: false
wandb_project_name: "ManiSkill"
wandb_entity: null  # TODO: set to your wandb entity (or leave null to use default)
wandb_group: "PPO-CMA"
capture_video: false
save_trajectory: false
save_model: false
evaluate: false
checkpoint: null

# Environment settings
num_envs: 1024
num_eval_envs: 8
num_steps: 50
num_eval_steps: 50
partial_reset: true
eval_partial_reset: false
reconfiguration_freq: null
eval_reconfiguration_freq: 1
control_mode: "pd_joint_delta_pos"
save_train_video_freq: null

# PPO-CMA hyperparameters
total_timesteps: 50_000_000
mean_lr: 3e-4
var_lr: 3e-4
critic_lr: 3e-4
learning_rate: 3e-4
anneal_lr: false
gamma: 0.8
gae_lambda: 0.9
num_minibatches: 32
norm_adv: false
max_grad_norm: 0.5
reward_scale: 1.0
finite_horizon_gae: false
eval_freq: 25

# PPO-CMA specific
history_buffer_size: 5
variance_train_steps: 100
mean_train_steps: 100
critic_train_steps: 100
lower_std_limit: 0.01
critic_loss_type: "l1"
use_mirroring: true

# Network architecture
discrete_action: false
ppocma_actor_width: 128
ppocma_actor_depth: 2
actor_width: 128
actor_depth: 2
critic_width: 256
critic_depth: 3
use_residual_blocks: false
num_bins: 41
